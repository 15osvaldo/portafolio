<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Se eliminó jQuery porque no se estaba usando (mejora el rendimiento) -->
    <title>Mis Certificados - Portafolio</title>
    <style>
        /* ==============================
           Variables y Ajustes Básicos
           ============================== */
        :root {
            --bg-main: #0f172a; /* Azul oscuro moderno */
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 2rem 1rem;
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* ==============================
           Layout Principal
           ============================== */
        .contenedor-principal {
            display: flex;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: 2rem auto;
            gap: 2rem;
            padding: 0 1rem;
            width: 100%;
        }

        /* --- Panel Izquierdo: Acordeón de Botones --- */
        .panel-menu {
            flex: 1 1 350px;
            background-color: var(--bg-card);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }

        .categoria {
            margin-bottom: 1rem;
        }

        .categoria-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #27354f;
            padding: 1rem 1.2rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: background-color 0.3s ease;
            border: 1px solid transparent;
        }

        .categoria-header:hover {
            background-color: #334155;
            border-color: var(--text-muted);
        }

        /* Pequeñas insignias de texto en lugar de imágenes rotas para mantenerlo limpio */
        .badge {
            font-size: 0.75rem;
            background: var(--accent);
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Contenido oculto del acordeón */
        .opciones-lista {
            display: none; /* Oculto por defecto */
            flex-direction: column;
            gap: 0.5rem;
            padding: 1rem 0.5rem 0.5rem 0.5rem;
            animation: fadeIn 0.3s ease;
            
            /* Ajustes para el Scroll */
            max-height: 320px; /* Límite de altura */
            overflow-y: auto;  /* Habilita el scroll vertical si hay muchos elementos */
            padding-right: 8px; /* Espacio para que el scroll no toque los botones */
        }

        .opciones-lista.activa {
            display: flex;
        }

        /* Diseño del scrollbar personalizado para modo oscuro (WebKit) */
        .opciones-lista::-webkit-scrollbar {
            width: 6px;
        }
        .opciones-lista::-webkit-scrollbar-track {
            background: var(--bg-main);
            border-radius: 10px;
        }
        .opciones-lista::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }
        .opciones-lista::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .boton-cert {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 0.8rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            text-align: left;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            width: 100%;
        }

        .boton-cert:hover, .boton-cert.activo {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: translateX(5px); /* Pequeño efecto de movimiento */
        }

        .link-credencial {
            display: inline-block;
            text-align: center;
            background-color: transparent;
            color: #38bdf8;
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.4rem;
            border: 1px dashed #38bdf8;
            border-radius: 0.4rem;
            margin-top: -0.2rem;
            margin-bottom: 0.5rem;
            transition: all 0.2s ease;
        }

        .link-credencial:hover {
            background-color: #38bdf8;
            color: var(--bg-main);
        }

        /* --- Panel Derecho: Vista Previa del Certificado --- */
        .panel-preview {
            flex: 2 1 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-card);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .visor-imagen {
            width: 100%;
            max-width: 800px;
            border-radius: 0.5rem;
            border: 4px solid var(--border-color);
            cursor: zoom-in;
            transition: transform 0.3s ease, border-color 0.3s ease;
            background-color: #000; /* Fondo por si la imagen tarda en cargar */
        }

        .visor-imagen:hover {
            transform: scale(1.02);
            border-color: var(--accent);
        }

        .instruccion {
            margin-top: 1rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
        }

        /* ==============================
           Modal (Zoom de imagen)
           ============================== */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.mostrar {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 0.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: zoomIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close:hover {
            color: var(--accent);
        }

        #caption {
            position: absolute;
            bottom: 20px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            background: rgba(0,0,0,0.6);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
        }

        /* Animaciones */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .contenedor-principal {
                flex-direction: column;
            }
            .panel-preview {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Mis Certificados y Logros</h1>
    </header>

    <div class="contenedor-principal">
        
        <!-- PANEL IZQUIERDO: MENÚ DE NAVEGACIÓN -->
        <div class="panel-menu">
            
            <!-- Sección Udemy -->
            <div class="categoria">
                <div class="categoria-header" onclick="toggleSeccion('udemy')">
                    <span>UDEMY</span>
                    <span class="badge">11</span>
                </div>
                <div id="udemy" class="opciones-lista activa"> <!-- Abierto por defecto -->
                    <button class="boton-cert activo" onclick="cambiarImagen('CSS.jpg', 'Certificado de CSS', this)">CSS</button>
                    <button class="boton-cert" onclick="cambiarImagen('MySQL.jpg', 'Certificado de MySQL', this)">MySQL</button>
                    <button class="boton-cert" onclick="cambiarImagen('git.jpg', 'Certificado de Introducción a GIT', this)">Introducción a GIT</button>
                    <button class="boton-cert" onclick="cambiarImagen('javascript.jpg', 'Certificado de Introducción a Javascript', this)">Introducción a Javascript</button>
                    <button class="boton-cert" onclick="cambiarImagen('react.jpg', 'Certificado de React Nivel Básico', this)">React Nivel Básico</button>
                    <button class="boton-cert" onclick="cambiarImagen('react-firebase.jpg', 'Certificado de React + Firebase', this)">React + Firebase</button>
                    <button class="boton-cert" onclick="cambiarImagen('csharp2.jpg', 'Certificado de CSHARP Nivel Básico', this)">C# Nivel Básico</button>
                    <button class="boton-cert" onclick="cambiarImagen('csharp1.jpg', 'Certificado de CSHARP Nivel Intermedio', this)">C# Nivel Intermedio</button>
                    <button class="boton-cert" onclick="cambiarImagen('flutter.jpg', 'Certificado de FLUTTER', this)">Flutter</button>
                    <button class="boton-cert" onclick="cambiarImagen('hacking-shell.jpg', 'Certificado de Hacking Shell', this)">Hacking Shell</button>
                    <button class="boton-cert" onclick="cambiarImagen('hacking-etico.jpg', 'Certificado de Hacking Ético', this)">Hacking Ético</button>
                </div>
            </div>

            <!-- Sección FreeCodeCamp -->
            <div class="categoria">
                <div class="categoria-header" onclick="toggleSeccion('freecode')">
                    <span>FreeCodeCamp</span>
                    <span class="badge">2</span>
                </div>
                <div id="freecode" class="opciones-lista">
                    <button class="boton-cert" onclick="cambiarImagen('FCC_FRONT1.jpg', 'Front End Development Libraries con React', this)">Front End Libraries (React)</button>
                    <a class="link-credencial" target="_blank" href="https://www.freecodecamp.org/certification/fccc6104ba0-aaf7-45a8-a8f4-ea339dad1ad7/front-end-development-libraries">🔗 Verificar Credencial</a>
                    
                    <button class="boton-cert" onclick="cambiarImagen('FCC_javascript.jpg', 'Legacy Javascript Algorithms and Data Structure', this)">JavaScript Algorithms</button>
                    <a class="link-credencial" target="_blank" href="https://www.freecodecamp.org/certification/fccc6104ba0-aaf7-45a8-a8f4-ea339dad1ad7/javascript-algorithms-and-data-structures">🔗 Verificar Credencial</a>
                </div>
            </div>

            <!-- Sección BIG School -->
            <div class="categoria">
                <div class="categoria-header" onclick="toggleSeccion('bigschool')">
                    <span>BIG School</span>
                    <span class="badge">1</span>
                </div>
                <div id="bigschool" class="opciones-lista">
                    <button class="boton-cert" onclick="cambiarImagen('Certificado-big.jpg', 'Ciberseguridad y Hacking Ético - BIG School', this)">Ciberseguridad y Hacking Ético</button>
                </div>
            </div>

            <!-- Sección Google Activate -->
            <div class="categoria">
                <div class="categoria-header" onclick="toggleSeccion('google')">
                    <span>Google Activate</span>
                    <span class="badge">2</span>
                </div>
                <div id="google" class="opciones-lista">
                    <button class="boton-cert" onclick="cambiarImagen('google1.jpg', 'Introducción a Programación Web I', this)">Programación Web I</button>
                    <button class="boton-cert" onclick="cambiarImagen('google2.jpg', 'Introducción a Programación Web II', this)">Programación Web II</button>
                </div>
            </div>

        </div>

        <!-- PANEL DERECHO: VISOR DE IMAGEN -->
        <div class="panel-preview">
            <!-- Agregué un fallback en onerror por si las imágenes locales no cargan, muestra un texto temporal -->
            <img 
                id="visor-img" 
                class="visor-imagen" 
                src="CSS.jpg" 
                alt="Certificado de CSS" 
                onclick="abrirModal()"
               "
            >
            <p class="instruccion">👆 Haz clic en la imagen para ampliarla</p>
        </div>

    </div>

    <!-- EL MODAL PARA VER EN GRANDE -->
    <div id="myModal" class="modal">
        <span class="close" onclick="cerrarModal()">&times;</span>
        <img class="modal-content" id="img01">
        <div id="caption">Certificado de CSS</div>
    </div>

    <!-- SCRIPT CORREGIDO Y OPTIMIZADO -->
    <script>
        // 1. Lógica del Acordeón (Menú lateral)
        function toggleSeccion(id) {
            const listaOpciones = document.querySelectorAll('.opciones-lista');
            
            listaOpciones.forEach(seccion => {
                if (seccion.id === id) {
                    seccion.classList.toggle('activa');
                } else {
                    // Cierra las demás automáticamente para mantenerlo ordenado
                    seccion.classList.remove('activa');
                }
            });
        }

        // 2. Lógica para cambiar la imagen del visor
        function cambiarImagen(rutaImagen, textoAlt, btnElement) {
            const visor = document.getElementById("visor-img");
            visor.src = rutaImagen;
            visor.alt = textoAlt;

            // Actualiza el estilo del botón activo
            document.querySelectorAll('.boton-cert').forEach(btn => btn.classList.remove('activo'));
            if (btnElement) {
                btnElement.classList.add('activo');
            }
        }

        // 3. Lógica del Modal (Zoom)
        const modal = document.getElementById("myModal");
        const modalImg = document.getElementById("img01");
        const captionText = document.getElementById("caption");
        const visor = document.getElementById("visor-img");

        function abrirModal() {
            modal.classList.add("mostrar");
            modalImg.src = visor.src;
            captionText.innerHTML = visor.alt;
        }

        function cerrarModal() {
            modal.classList.remove("mostrar");
        }

        // Cerrar modal al hacer clic fuera de la imagen
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                cerrarModal();
            }
        });

        // Cerrar modal con la tecla Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape" && modal.classList.contains("mostrar")) {
                cerrarModal();
            }
        });
    </script>
</body>
</html>
